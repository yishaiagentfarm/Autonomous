<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tailored resume tool">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#161d3a"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="badge" x1="286" y1="308" x2="414" y2="436" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#a7f3d0"/>
    </linearGradient>
  </defs>

  <!-- rounded-square app tile -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="3" y="3" width="506" height="506" rx="113" fill="none" stroke="#2a3358" stroke-width="6"/>

  <!-- resume document -->
  <rect x="150" y="116" width="212" height="280" rx="22" fill="#eef1f8"/>
  <!-- title line (accent) -->
  <rect x="182" y="158" width="120" height="20" rx="10" fill="#7dd3fc"/>
  <!-- body lines -->
  <rect x="182" y="202" width="148" height="14" rx="7" fill="#aab4cc"/>
  <rect x="182" y="232" width="148" height="14" rx="7" fill="#aab4cc"/>
  <rect x="182" y="262" width="148" height="14" rx="7" fill="#aab4cc"/>
  <rect x="182" y="292" width="96"  height="14" rx="7" fill="#aab4cc"/>

  <!-- check badge -->
  <circle cx="356" cy="372" r="70" fill="#0b1020"/>
  <circle cx="356" cy="372" r="58" fill="url(#badge)"/>
  <path d="M328 374 L349 395 L388 348" fill="none" stroke="#0b1020"
        stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
